        <script>
            // Стартуем запрос баннеров максимально рано, параллельно загрузке модулей
            window.__bannersPromise = fetch('/.netlify/functions/get-banners')
                .then(r => r.ok ? r.json() : null)
                .catch(() => null);

            // Как только пришёл JSON — сразу ставим src у первого баннера (по order),
            // не дожидаясь main.js и его импортов. Это нужно для быстрого LCP.
            // Брейкпоинт 768px должен совпадать с CSS и с MOBILE_QUERY в banners.js.
            window.__bannersPromise.then(function (data) {
                var list = (data && data.data) || [];
                if (!list.length) return;

                var first = list.slice().sort(function (a, b) {
                    var ao = Number.isFinite(a.order) ? a.order : Number.MAX_SAFE_INTEGER;
                    var bo = Number.isFinite(b.order) ? b.order : Number.MAX_SAFE_INTEGER;
                    return ao - bo;
                })[0];
                if (!first) return;

                var isMobile = window.matchMedia('(max-width: 768px)').matches;
                var hasMobileImage = !!(first.image_mobile && first.image_mobile.url);
                var url = (isMobile && hasMobileImage)
                    ? first.image_mobile.url
                    : (first.image && first.image.url);
                if (!url) return;

                var set = function () {
                    var el = document.querySelector('[data-banner-hero]');
                    if (!el) return false;
                    var img = el.querySelector('.banner__image');
                    if (!img) return false;
                    if (hasMobileImage) el.classList.add('banner--has-mobile');
                    img.src = url;
                    img.style.display = 'block';
                    return true;
                };
                if (!set()) document.addEventListener('DOMContentLoaded', set);
            });
        </script>

        <div id="header">
        </div>

        <!--
            Баннеры и сетки продуктов рендерятся из Strapi в js/banners.js.
            Порядок задаётся полем order в Strapi.
            Ниже в HTML остаётся только hero-заготовка для быстрой загрузки
            первой картинки — её переиспользует banners.js.
        -->
        <main class="home" data-banners-container>
            <div class="banner banner--he" data-banner-hero>
                <img class="banner__image" src="" alt="banner" fetchpriority="high">
                <div class="banner__content"></div>
            </div>
        </main>

        <div id="footer">
        </div>

        <script src="/js/preloader.js"></script>
        <script type="module" src="/js/main.js"></script>
    </body>
