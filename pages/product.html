        <title>HEBRANTE. Home</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Mohave:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="/css/preloader.css">
        <link rel="stylesheet" href="/css/main.css">
        <link rel="stylesheet" href="/css/layout.css">
        <link rel="stylesheet" href="/css/components.css">
        <link rel="icon" href="/favicon.ico" sizes="32x32">
        <link rel="icon" href="/favicon.svg" type="image/svg+xml">

    </head>
    <body>
        <!-- Google Tag Manager (noscript) -->
        <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TKTLLJZZ"
        height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
        <!-- End Google Tag Manager (noscript) -->

        <div id="global-preloader" class="global-preloader global-preloader--modern">
            <div class="preloader-container">
                <div class="preloader-logo-wrapper">
                    <img src="/assets/icons/logo.png">
                </div>
                <p class="preloader-text">Cargando contenido</p>
                <div class="progress-bar">
                <div class="progress-fill"></div>
                </div>
            </div>
        </div>
         
        <div id="header">
        </div>
        <main>
            <div class="container">
                <div class="product-layout">

                    <!-- ROW 1 -->
                    <div class="product-layout__image">
                        <img src="img1.jpg">
                    </div>

                    <div class="product-layout__info">
                        <h1 class="product__title">Title</h1>
                        <p class="product__price">$200</p>

                        <div class="product-sizes">
                            <div class="size-dropdown">
                                <button class="size-dropdown__btn">
                                    <span class="size-dropdown__selected" data-i18n="size">Talla</span>
                                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M6 9L12 15L18 9" stroke="#1E110D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>

                                <div class="size-dropdown__list">
                                    <button class="size-dropdown__option">XS</button>
                                    <button class="size-dropdown__option">S</button>
                                    <button class="size-dropdown__option">M</button>
                                    <button class="size-dropdown__option">L</button>
                                    <button class="size-dropdown__option">XL</button>
                                </div>
                            </div>
                            <button data-open-size-helper class="size-recommend" data-i18n="what_size">
                                ¿Cuál es mi talla?
                            </button>
                        </div>

                        <button class="product__add-to-cart" data-i18n="add_to_cart">
                            Añadir al carrito
                        </button>

                        <!-- toggles -->
                        <div class="accordion">
                            <button class="accordion__header">
                                <span data-i18n="description">Descripción</span>
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M6 9L12 15L18 9" stroke="#1E110D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                            <div class="accordion__content">Text...</div>
                        </div>
                        <div class="accordion">
                            <button class="accordion__header">
                                <span data-i18n="details">Detalles</span>
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M6 9L12 15L18 9" stroke="#1E110D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                            <div class="accordion__content">Text...</div>
                        </div>
                        <!--<div class="accordion">
                            <button class="accordion__header">
                                <span data-i18n="materials">Materiales</span>
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M6 9L12 15L18 9" stroke="#1E110D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                            <div class="accordion__content">Text...</div>
                        </div>-->
                        <div class="accordion">
                            <button class="accordion__header">
                                <span data-i18n="shipping">Envío</span>
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M6 9L12 15L18 9" stroke="#1E110D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                            <div class="accordion__content">Text...</div>
                        </div>
                    </div>

                    <!-- ROW 2 -->
                    <div class="product-layout__features">
                        <p class="t2">Feature 1</p>
                        <p class="t2">Feature 2</p>
                        <p class="t2">Feature 3</p>
                    </div>

                    <div class="product-layout__image">
                        <img src="img2.jpg">
                    </div>

                    <!-- ROW 3 -->
                    <div class="product-layout__image">
                        <img src="img3.jpg">
                    </div>

                    <div class="product-layout__image">
                        <img src="img4.jpg">
                    </div>

                    <!-- ROW 3 -->
                    <div class="product-layout__image">
                        <img src="img5.jpg">
                    </div>

                    <div class="product-layout__image">
                        <img src="img6.jpg">
                    </div>
                </div>
            </div>
            <section class="section">
                <div class="container">
                    <div class="products-grid">
                    </div>
                </div>
            </section>
        </main>
        <div id="footer">  
        </div>
        <div id="size-helper-modal" class="modal hidden">
            <div class="modal__overlay"></div>
            <div class="modal__content">
                <button class="modal__close">&times</button>

                <h2 class="h2">¿cuál es mi talla?</h2>
                <p class="t1">
                    ingresa tu altura, peso y&nbsp;cómo prefieres el&nbsp;fit, y&nbsp;te&nbsp;ayudamos a&nbsp;encontrar la&nbsp;talla perfecta para&nbsp;ti.
                </p>

                <!-- FORM -->
                 <form id="size-form" class="size-form">
                    <div class="form-group">
                        <div class="line">
                            <label class="t1" for="height">Altura</label>
                            <div class="input-with-unit">
                                <input type="number" id="height" min="140" max="210" placeholder="170" required>
                                <span class="input-unit">cm</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="line">
                            <label class="t1" for="weight">Peso</label>
                            <div class="input-with-unit">
                                <input type="number" id="weight" min="40" max="150" placeholder="70" required>
                                <span class="input-unit">kg</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="line">
                            <label class="t1" for="fit">Fit</label>
                            <select id="fit" required>
                                <option value="regular">Regular</option>
                                <option value="oversize">Oversize</option>
                                <option value="slim">Slim</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn-lg">Calcular talla</button>
                 </form>

                <!-- RESULTADO -->
                <div id="size-result" class="size-result hidden">

                    <div class="result-summary">
                        <p class="t1">Altura: <span id="result-height"></span> cm</p>
                        <p class="t1">Peso: <span id="result-weight"></span> kg</p>
                        <p class="t1">Fit: <span id="result-fit"></span></p>
                    </div>

                    <div class="divider"></div>

                    <div class="recommended-size">
                        <p class="t1">Talla:</p>
                        <h3 class="h3" id="recommended-size-text"></h3>
                    </div>

                    <div class="modal__buttons">
                        <button id="recalculate-btn" class="btn-lg btn-secondary">Recalcular</button>
                        <button id="choose-size-btn" class="btn-lg">Elegir esta talla</button>
                    </div>
                </div>
            </div>
        </div>
        <script type="module" src="/js/main.js"></script>
        <script src="/js/preloader.js"></script>
        <script type="module" src="/js/product.js"></script>
    </body>
</html>
