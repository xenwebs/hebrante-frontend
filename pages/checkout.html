    <!-- Wompi: integración por redirección (Web Checkout).
         No requiere ningún <script> aquí; el redireccionamiento se arma en checkout.js -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEBRANTE. Checkout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mohave:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
        <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TKTLLJZZ"
        height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
        <!-- End Google Tag Manager (noscript) -->
         
    <div id="header">

    </div>
    
    <main class="checkout-main">
        <div class="container">
            <div class="checkout-wrapper">
                
                <!-- LEFT: Form -->
                <div class="checkout__form-section">
                    <h1 class="h1 checkout__title">Checkout</h1>
                    <!-- Message (Error / Success) -->
                    <div id="payment-message"></div>
                    
                    <!-- STEP 1: Contact Info -->
                    <form id="checkout-form" class="checkout-form">
                        <fieldset class="form-section">
                            <legend class="h3 form-section__title">Información de contacto</legend>
                            
                            <div class="line">
                                <div class="form-group">
                                    <label for="email" class="form-label">Email</label>
                                    <input 
                                        type="email" 
                                        id="email" 
                                        name="email" 
                                        required
                                        class="form-input"
                                        placeholder="tu@email.com"
                                    />
                                    <span class="form-error" id="email-error"></span>
                                </div>

                                <div class="form-group">
                                    <label for="phone" class="form-label">Teléfono</label>
                                    <input 
                                        type="tel" 
                                        id="phone" 
                                        name="phone" 
                                        required
                                        class="form-input"
                                        placeholder="+57 300 000 0000"
                                    />
                                    <span class="form-error" id="phone-error"></span>
                                </div>
                            </div>
                        </fieldset>

                        <!-- STEP 2: Shipping -->
                        <fieldset class="form-section">
                            <legend class="h3 form-section__title">Dirección de envío</legend>
                            
                            <div class="line">
                                <div class="form-group">
                                    <label for="firstName" class="form-label">Nombre</label>
                                    <input 
                                        type="text" 
                                        id="firstName" 
                                        name="firstName" 
                                        required
                                        class="form-input"
                                        placeholder="Juan"
                                    />
                                    <span class="form-error" id="firstName-error"></span>
                                </div>

                                <div class="form-group">
                                    <label for="lastName" class="form-label">Apellido</label>
                                    <input 
                                        type="text" 
                                        id="lastName"
                                        name="lastName" 
                                        required
                                        class="form-input"
                                        placeholder="Pérez"
                                    />
                                    <span class="form-error" id="lastName-error"></span>
                                </div>
                            </div>

                            <div class="line">

                                <div class="form-group">
                                    <label for="street" class="form-label">Dirección</label>
                                    <input 
                                        type="text" 
                                        id="street" 
                                        name="street" 
                                        required
                                        class="form-input"
                                        placeholder="Cra. 5 #12-34"
                                    />
                                    <span class="form-error" id="street-error"></span>
                                </div>

                                <div class="form-group">
                                    <label for="apartment" class="form-label">Apartamento, suite, etc.</label>
                                    <input 
                                        type="text" 
                                        id="apartment" 
                                        name="apartment"
                                        required
                                        class="form-input"
                                        placeholder="Apto 501"
                                    />
                                </div>
                            </div>

                            <div class="line">
                                <div class="form-group">
                                    <label for="city" class="form-label">Ciudad</label>
                                    <input 
                                        type="text" 
                                        id="city" 
                                        name="city" 
                                        required
                                        class="form-input"
                                        placeholder="Bogotá"
                                        list="cities-list"
                                    />
                                    <datalist id="cities-list">
                                        <option value="Bogotá">
                                        <option value="Medellín">
                                        <option value="Cali">
                                        <option value="Barranquilla">
                                        <option value="Cartagena">
                                        <option value="Santa Marta">
                                        <option value="Bucaramanga">
                                        <option value="Cúcuta">
                                        <option value="Pasto">
                                        <option value="Manizales">
                                    </datalist>
                                    <span class="form-error" id="city-error"></span>
                                </div>

                                <div class="form-group">
                                    <label for="state" class="form-label">Departamento</label>
                                    <select id="state" name="state" required class="form-input">
                                        <option value="">Selecciona un departamento</option>
                                        <option value="Cundinamarca">Cundinamarca</option>
                                        <option value="Antioquia">Antioquia</option>
                                        <option value="Valle del Cauca">Valle del Cauca</option>
                                        <option value="Atlántico">Atlántico</option>
                                        <option value="Bolívar">Bolívar</option>
                                        <option value="Magdalena">Magdalena</option>
                                        <option value="Santander">Santander</option>
                                        <option value="Norte de Santander">Norte de Santander</option>
                                        <option value="Nariño">Nariño</option>
                                        <option value="Caldas">Caldas</option>
                                    </select>
                                    <span class="form-error" id="state-error"></span>
                                </div>
                            </div>
                            <div class="line">
                                <div class="form-group">
                                    <label for="zip" class="form-label">Código postal</label>
                                    <input
                                        type="text"
                                        id="zip"
                                        name="zip"
                                        required
                                        class="form-input"
                                        placeholder="110111"
                                    />
                                    <span class="form-error" id="zip-error"></span>
                                </div>
                            </div>
                        </fieldset>

                        <!-- STEP 3: Shipping Method -->
                        <input type="hidden" name="shipping" value="standard">

                        <!-- STEP 3.5: Promo Code -->
                        <fieldset class="form-section">
                            <legend class="h3 form-section__title">Código promocional (opcional)</legend>
                            
                            <div class="promo-code-container">
                                <div class="line">
                                    <div class="form-group">
                                        <label for="promo-code" class="form-label">Ingresa tu código</label>
                                        <input 
                                            type="text" 
                                            id="promo-code" 
                                            name="promo-code"
                                            class="form-input"
                                            placeholder="Ej: SUMMER2024"
                                            autocomplete="off"
                                        />
                                        <span class="form-error" id="promo-code-error"></span>
                                        <span class="promo-success" id="promo-code-success"></span>
                                    </div>
                                    <button type="button" id="apply-promo-btn" class="promo-btn">
                                        Aplicar
                                    </button>
                                </div>

                                <div id="discount-info" class="discount-info" style="display: none;">
                                    <div class="discount-badge">
                                        <span id="discount-percent">0%</span> descuento
                                    </div>
                                </div>
                            </div>
                        </fieldset>

                        <!-- STEP 4: Submit -->
                         <button type="submit" id="submit-btn" class="checkout-btn">
                            Confirmar Pedido
                        </button>
                    </form>
                </div>

                <!-- RIGHT: Cart Summary -->
                <aside class="checkout__summary">
                    <div class="order-summary">
                        <div class="order-items" id="order-items">
                        
                        </div>

                        <div class="order-summary__divider"></div>

                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span id="subtotal">$0</span>
                        </div>

                        <div class="summary-row">
                            <span>Envío</span>
                            <span id="shipping-cost">Gratis</span>
                        </div>

                        <div class="summary-row summary-row--total">
                            <span>Total</span>
                            <span id="total">$0</span>
                        </div>

                        <a href="/pages/cart.html" class="back-to-cart-link">
                            ← Volver al carrito
                        </a>
                    </div>
                </aside>
                
            </div>
        </div>
    </main>

    <div id="footer">

    </div>

    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/checkout.js"></script>
</body>
</html>
